name: Publish nRPC Restate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Pack release tarball
        run: npm pack

      - name: Verify npm package access
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p 'require("./package.json").name')
          if npm view "$PACKAGE_NAME" name --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "Package exists on npm: $PACKAGE_NAME"
          else
            echo "npm does not currently expose $PACKAGE_NAME for publish/view from this account/scope."
            echo "For trusted publishing, ensure the npm scope/package exists and the trusted publisher is attached to this exact package."
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: nRPC Restate v${{ steps.pkg.outputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          generate_release_notes: true
          files: |
            nogg-aholic-nrpc-restate-${{ steps.pkg.outputs.version }}.tgz